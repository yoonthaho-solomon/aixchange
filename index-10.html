            <div className="lbl" style={{marginBottom:8}}>Lineage</div>
            <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
              {detail.forkFrom&&<><span style={{padding:'3px 9px',background:'rgba(124,58,237,.1)',border:'1px solid rgba(124,58,237,.2)',borderRadius:4,fontSize:12,color:'#C4B5FD'}}>← {detail.forkFrom}</span><span style={{color:'var(--t3)'}}>›</span></>}
              <span style={{padding:'3px 9px',background:'rgba(234,179,8,.1)',border:'1px solid rgba(234,179,8,.2)',borderRadius:4,fontSize:12,color:'#FDE047',fontWeight:600}}>★ {detail.title}</span>
              {detail.forkTo.map(f=><React.Fragment key={f}><span style={{color:'var(--t3)'}}>›</span><span style={{padding:'3px 9px',background:'rgba(96,165,250,.1)',border:'1px solid rgba(96,165,250,.2)',borderRadius:4,fontSize:12,color:'#93C5FD'}}>{f} →</span></React.Fragment>)}
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <div className="lbl" style={{marginBottom:10}}>Recent Donations</div>
            {detail.hist.map((h,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid var(--b)'}}>
                <div><span style={{fontSize:13,fontWeight:500}}>{h.u}</span>{h.m&&<span style={{fontSize:12,color:'var(--t3)',marginLeft:8}}>"{h.m}"</span>}</div>
                <div style={{textAlign:'right'}}><div style={{fontSize:13,fontWeight:600,color:'#22C55E'}}>+₩{h.a.toLocaleString()}</div><div className="lbl" style={{marginTop:2}}>{h.d}</div></div>
              </div>
            ))}
          </div>
          <div style={{marginBottom:22}}>
            <div className="lbl" style={{marginBottom:10}}>Reviews</div>
            {detail.reviews.map((r,i)=>(
              <div key={i} style={{padding:13,background:'rgba(255,255,255,.02)',borderRadius:8,border:'1px solid var(--b)',marginBottom:7}}>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}><span style={{fontSize:12,fontWeight:600,color:'var(--pl)'}}>{r.u}</span><span style={{fontSize:12,color:'#EAB308'}}>{'★'.repeat(r.s)}{'☆'.repeat(5-r.s)}</span></div>
                <p style={{fontSize:13,color:'var(--t2)'}}>{r.t}</p>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="bp" onClick={()=>{setDetail(null);setPay(detail);setAmt(detail.price);}} style={{flex:1,justifyContent:'center',padding:'11px 0'}}>₩{detail.price} 다운로드</button>
            <button className="bs" onClick={()=>{setDetail(null);setDon(detail);setAmt(100);}} style={{flex:1,justifyContent:'center',padding:'11px 0'}}>도네이션 ♡</button>
          </div>
        </div>
      </div>
    </div>
  )}

  {/* PAY MODAL */}
  {pay&&<Overlay onClose={()=>setPay(null)}>
    <MH label="Download" title={pay.title} onClose={()=>setPay(null)}/>
    <div style={{padding:'0 24px 24px',display:'flex',flexDirection:'column',gap:12,marginTop:16}}>
      <div style={{display:'flex',gap:8}}>
        {[100,300,1000].map(p=><button key={p} onClick={()=>setAmt(p)} style={{flex:1,padding:'11px 8px',background:amt===p?'rgba(124,58,237,.14)':'rgba(255,255,255,.03)',border:`1px solid ${amt===p?'rgba(124,58,237,.4)':'var(--b)'}`,borderRadius:8,fontSize:14,fontWeight:600,color:amt===p?'#C4B5FD':'var(--t2)',cursor:'pointer',fontFamily:'Inter'}}>₩{p}</button>)}
      </div>
      <div style={{padding:16,background:'rgba(255,255,255,.02)',borderRadius:8,border:'1px solid var(--b)',textAlign:'center'}}>
        <div className="lbl" style={{marginBottom:5}}>결제 금액</div>
        <div style={{fontSize:30,fontWeight:700,letterSpacing:'-.03em'}}>₩{amt.toLocaleString()}</div>
      </div>
      <button className="bp" onClick={handlePay} style={{justifyContent:'center',padding:'12px 0',fontSize:14}}>₩{amt.toLocaleString()} 결제하기</button>
    </div>
  </Overlay>}

  {/* DONATE MODAL */}
  {don&&<Overlay onClose={()=>setDon(null)}>
    <MH label="Donation ♡" title={don.title} onClose={()=>setDon(null)}/>
    <div style={{padding:'0 24px 24px',display:'flex',flexDirection:'column',gap:12,marginTop:16}}>
      <div style={{display:'flex',gap:8}}>
        {[100,300,1000].map(p=><button key={p} onClick={()=>setAmt(p)} style={{flex:1,padding:'14px 8px',background:amt===p?'rgba(34,197,94,.1)':'rgba(255,255,255,.03)',border:`1px solid ${amt===p?'rgba(34,197,94,.3)':'var(--b)'}`,borderRadius:8,fontSize:15,fontWeight:600,color:amt===p?'#86EFAC':'var(--t2)',cursor:'pointer',fontFamily:'Inter'}}>₩{p}</button>)}
      </div>
      <div style={{padding:13,background:'rgba(255,255,255,.02)',borderRadius:8,border:'1px solid var(--b)',fontSize:13}}>
        <div style={{display:'flex',justifyContent:'space-between',color:'var(--t2)',marginBottom:5}}><span>결제 금액</span><span>₩{amt.toLocaleString()}</span></div>
        <div style={{display:'flex',justifyContent:'space-between',color:'var(--r)',marginBottom:7,paddingBottom:7,borderBottom:'1px solid var(--b)'}}><span>플랫폼 수수료 10%</span><span>-₩{fee(amt)}</span></div>
        <div style={{display:'flex',justifyContent:'space-between',fontWeight:600}}><span>제작자 수령액</span><span style={{color:'#22C55E'}}>₩{net(amt).toLocaleString()}</span></div>
      </div>
      <button className="bp" onClick={handleTossDonate} style={{justifyContent:'center',padding:'12px 0',fontSize:14,background:'#15803D'}}>₩{amt} 도네이션하기</button>
    </div>
  </Overlay>}

  {/* AUTH MODAL */}
  {auth&&<Overlay onClose={()=>setAuth(false)}>
    <MH label={aMode==='login'?'Log in':'Sign up'} title={aMode==='login'?'로그인':'회원가입'} onClose={()=>setAuth(false)}/>
    <div style={{padding:'0 24px 24px',display:'flex',flexDirection:'column',gap:10,marginTop:16}}>
      {aMode==='signup'&&<input placeholder="이름"/>}
      <input id="auth-email" type="email" placeholder="이메일"/>
      <input id="auth-pw" type="password" placeholder="비밀번호"/>
      <button className="bp" onClick={handleAuth} disabled={authLoading} style={{justifyContent:'center',padding:'11px 0',marginTop:4,opacity:authLoading?.6:1}}>
        {authLoading?'처리 중...':(aMode==='login'?'로그인':'회원가입')}
      </button>
      <div style={{textAlign:'center',fontSize:13,color:'var(--t3)'}}>
        {aMode==='login'?<span>계정 없으신가요? <button className="bg" onClick={()=>setAMode('signup')} style={{color:'var(--pl)'}}>회원가입</button></span>:<span>이미 계정이 있으신가요? <button className="bg" onClick={()=>setAMode('login')} style={{color:'var(--pl)'}}>로그인</button></span>}
      </div>
    </div>
  </Overlay>}

  {/* UPLOAD MODAL */}
  {up&&<Overlay onClose={()=>setUp(false)}>
    <MH label="Upload · Asset" title="AI 기술 업로드" onClose={()=>setUp(false)}/>
    <div style={{padding:'0 24px 24px',display:'flex',flexDirection:'column',gap:10,marginTop:16}}>
      <input placeholder="제목" value={upData.title} onChange={e=>setUpData(p=>({...p,title:e.target.value}))}/>
      <select value={upData.cat} onChange={e=>setUpData(p=>({...p,cat:e.target.value}))}>
        {['PROMPT','AGENT','SKILL','MCP','HARNESS'].map(c=><option key={c}>{c}</option>)}
      </select>
      <div style={{display:'flex',gap:8}}>
        {[100,300,1000].map(p=><button key={p} onClick={()=>setUpData(d=>({...d,price:p}))} style={{flex:1,padding:'10px',background:upData.price===p?'rgba(124,58,237,.2)':'rgba(255,255,255,.03)',border:`1px solid ${upData.price===p?'rgba(124,58,237,.5)':'var(--b)'}`,borderRadius:8,color:upData.price===p?'#C4B5FD':'var(--t2)',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'Inter'}}>₩{p}</button>)}
      </div>
      <textarea placeholder="설명 (어떤 문제를 해결하나요?)" rows={4} style={{resize:'none'}} value={upData.desc} onChange={e=>setUpData(p=>({...p,desc:e.target.value}))}/>
      <button className="bp" onClick={handleUpload} disabled={upLoading} style={{justifyContent:'center',padding:'11px 0',marginTop:4,opacity:upLoading?.6:1}}>
        {upLoading?'업로드 중...':'업로드 실행'}
      </button>
      {!user&&<div style={{textAlign:'center',fontSize:12,color:'var(--t3)'}}>로그인 후 업로드 가능합니다</div>}
    </div>
  </Overlay>}

  {/* ARENA MODAL */}
  {arena&&(
    <div onClick={()=>{setArena(false);setVoted(null);setRes(false);}} style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.92)',backdropFilter:'blur(12px)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:700,animation:'fadeIn .2s'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div className="lbl" style={{color:'var(--pl)',marginBottom:8}}>⚔ {bt.label}</div>
          <h2 style={{fontSize:26,fontWeight:700,letterSpacing:'-.03em',marginBottom:6}}>{voted?'결과를 확인하세요':'더 뛰어난 기술에 투표하세요'}</h2>
          <p style={{fontSize:13,color:'var(--t3)'}}>{tv.toLocaleString()}명 참여 중</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:12,alignItems:'stretch',marginBottom:14}} className="arena-cards">
          {[bt.left,bt.right].map((s,i)=>(
            <React.Fragment key={i}>
              {i===1&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}} className="arena-vs"><span style={{fontSize:14,fontWeight:700,color:'var(--t3)'}}>VS</span></div>}
              <div className="card" onClick={()=>{if(!voted){setVoted(i===0?'left':'right');setTimeout(()=>setRes(true),300);}}} style={{padding:22,cursor:voted?'default':'pointer',borderColor:voted===(i===0?'left':'right')?(i===0?'rgba(124,58,237,.5)':'rgba(96,165,250,.5)'):'var(--b)',background:voted===(i===0?'left':'right')?(i===0?'rgba(124,58,237,.06)':'rgba(96,165,250,.06)'):'var(--s)',opacity:voted&&voted!==(i===0?'left':'right')?.42:1,transition:'all .2s'}}>
                <div style={{fontSize:30,marginBottom:12}}>{s.icon}</div>
                <div className="lbl" style={{marginBottom:3,color:i===0?'var(--pl)':'#60A5FA'}}>{s.cat}</div>
                <div style={{fontSize:15,fontWeight:600,letterSpacing:'-.02em',marginBottom:5,lineHeight:1.3}}>{s.title}</div>
                <p style={{fontSize:12,color:'var(--t2)',marginBottom:14}}>{s.desc}</p>
                {res?(
                  <div>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                      <span style={{fontSize:18,fontWeight:700,color:i===0?'var(--pl)':'#60A5FA'}}>{i===0?lp:rp}%</span>
                      <span style={{fontSize:12,color:'var(--t3)',alignSelf:'flex-end'}}>{(i===0?bt.lv+(voted==='left'?1:0):bt.rv+(voted==='right'?1:0)).toLocaleString()}표</span>
                    </div>
                    <div style={{height:3,background:'rgba(255,255,255,.06)',borderRadius:2,overflow:'hidden'}}>
                      <div style={{height:'100%',borderRadius:2,width:`${i===0?lp:rp}%`,background:i===0?'var(--p)':'#3B82F6',transition:'width .65s cubic-bezier(.16,1,.3,1)'}}/>
                    </div>
                  </div>
                ):(
                  <div style={{padding:'7px',textAlign:'center',border:`1px solid ${i===0?'rgba(124,58,237,.3)':'rgba(96,165,250,.3)'}`,borderRadius:6,fontSize:12,fontWeight:500,color:i===0?'var(--pl)':'#60A5FA'}}>
                    {voted===(i===0?'left':'right')?'✓ 투표 완료':'투표하기'}
                  </div>
                )}
              </div>
            </React.Fragment>
          ))}
        </div>
        {res&&<div style={{padding:'11px 16px',textAlign:'center',marginBottom:12,border:`1px solid ${lp>rp?'rgba(124,58,237,.3)':'rgba(96,165,250,.3)'}`,borderRadius:8,fontSize:13,fontWeight:500,color:lp>rp?'var(--pl)':'#60A5FA'}}>현재 우세 · <strong>{(lp>rp?bt.left:bt.right).title}</strong></div>}
        <div style={{display:'flex',gap:10}}>
          <button className="bs" onClick={()=>{setArena(false);setVoted(null);setRes(false);}} style={{flex:1,justifyContent:'center',padding:'11px 0'}}>닫기</button>
          {voted&&<button className="bp" onClick={()=>{setVoted(null);setRes(false);setAIdx((aIdx+1)%BATTLES.length);}} style={{flex:1,justifyContent:'center',padding:'11px 0'}}>다음 배틀 →</button>}
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:5,marginTop:14}}>
          {BATTLES.map((_,i)=><div key={i} style={{width:i===aIdx?18:5,height:3,borderRadius:2,background:i===aIdx?'var(--p)':'rgba(255,255,255,.12)',transition:'width .2s'}}/>)}
        </div>
      </div>
    </div>
  )}

  {/* MYPAGE MODAL */}
  {mp&&(
    <div onClick={()=>setMp(false)} style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)',overflowY:'auto',padding:20,display:'flex',justifyContent:'center',alignItems:'flex-start'}}>
      <div onClick={e=>e.stopPropagation()} className="card" style={{width:'100%',maxWidth:620,background:'#0c0c0c',marginTop:28,marginBottom:28,animation:'fadeIn .2s'}}>
        <div style={{padding:'22px 26px',borderBottom:'1px solid var(--b)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div className="lbl" style={{marginBottom:4}}>Dashboard</div><h3 style={{fontSize:17,fontWeight:600}}>마이페이지</h3></div>
          <button className="bg" onClick={()=>setMp(false)} style={{fontSize:22}}>×</button>
        </div>
        <div style={{padding:26}}>
          <div style={{padding:13,background:'rgba(255,255,255,.02)',border:'1px solid var(--b)',borderRadius:8,marginBottom:20,display:'flex',justifyContent:'space-between',fontSize:13,flexWrap:'wrap',gap:8}}>
            <span style={{color:'var(--t2)'}}>총 거래액 <strong style={{color:'var(--t1)'}}>₩31,800</strong></span>
            <span style={{color:'var(--r)'}}>수수료 10% −₩3,180</span>
            <span style={{color:'#22C55E',fontWeight:600}}>실수령 ₩28,620</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:0,marginBottom:24,borderTop:'1px solid var(--b)',borderBottom:'1px solid var(--b)'}} className="mp-grid">
            {[['실수령','₩28,620'],['이번주','₩164K'],['다운로드','12,842'],['랭킹','#14']].map(([l,v],i)=>(
              <div key={l} style={{padding:'15px 0',paddingLeft:i>0?14:0,borderLeft:i>0?'1px solid var(--b)':'none'}}>
                <div className="lbl" style={{marginBottom:4}}>{l}</div>
                <div style={{fontSize:17,fontWeight:700,letterSpacing:'-.02em'}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div className="lbl">Revenue History</div>
            <button className="bg" onClick={()=>showT('✓ 정산 요청 완료')} style={{color:'var(--pl)',fontSize:12}}>정산 요청 →</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:'0 10px',fontSize:11,color:'var(--t3)',fontWeight:600,letterSpacing:'.04em',marginBottom:7,padding:'0 0 7px',borderBottom:'1px solid var(--b)'}}>
            <span>ITEM</span><span>GROSS</span><span style={{color:'var(--r)'}}>FEE</span><span style={{color:'#22C55E'}}>NET</span>
          </div>
          {[{n:'Taxi Surge AI',g:12300,t:'DOWNLOAD',d:'05.13'},{n:'PromptChain v4',g:8200,t:'DONATION',d:'05.12'},{n:'MCP Suite',g:5100,t:'DOWNLOAD',d:'05.11'},{n:'Claude KR Pack',g:3400,t:'FORK_ROYALTY',d:'05.10'}].map((r,i)=>(
            <div key={i} style={{display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:'0 10px',alignItems:'center',padding:'11px 0',borderBottom:'1px solid var(--b)'}}>
              <div><div style={{fontSize:13,fontWeight:500}}>{r.n}</div><div className="lbl" style={{marginTop:2}}><span style={{color:'var(--pl)'}}>{r.t}</span> · {r.d}</div></div>
              <span style={{fontSize:12,color:'var(--t2)'}}>₩{r.g.toLocaleString()}</span>
              <span style={{fontSize:12,color:'var(--r)'}}>−₩{fee(r.g)}</span>
              <span style={{fontSize:12,fontWeight:600,color:'#22C55E'}}>₩{net(r.g).toLocaleString()}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  )}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
