<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:#000;color:rgba(255,255,255,0.9);-webkit-font-smoothing:antialiased;overflow-x:hidden}
:root{--p:#7C3AED;--pl:#8B5CF6;--b:rgba(255,255,255,0.06);--bh:rgba(255,255,255,0.12);--ba:rgba(124,58,237,0.5);--s:rgba(255,255,255,0.03);--sh:rgba(255,255,255,0.05);--t1:rgba(255,255,255,0.95);--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.28);--r:#EF4444}
.lbl{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.card{background:var(--s);border:1px solid var(--b);border-radius:12px;transition:border-color .2s,background .2s}
.card:hover{border-color:var(--bh);background:var(--sh)}
input,select,textarea{font-family:'Inter',sans-serif;width:100%;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:8px;color:var(--t1);font-size:14px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--pl)}
input::placeholder,textarea::placeholder{color:var(--t3)}
select option{background:#111}
button{font-family:'Inter',sans-serif;cursor:pointer}
.bp{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:var(--p);color:#fff;font-size:13px;font-weight:500;border:none;border-radius:6px;cursor:pointer;transition:opacity .15s}
.bp:hover{opacity:.88}
.bs{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:transparent;color:var(--t1);font-size:13px;font-weight:500;border:1px solid var(--bh);border-radius:6px;cursor:pointer;transition:border-color .15s}
.bs:hover{border-color:var(--ba)}
.bg{background:none;border:none;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:color .15s;font-family:'Inter'}
.bg:hover{color:var(--t1)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
::selection{background:var(--p);color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.fi{animation:fadeIn .5s cubic-bezier(.16,1,.3,1) both}
.dot{animation:pulse 2s ease-in-out infinite}
@media(max-width:768px){
  .hero-grid{grid-template-columns:1fr!important;gap:32px!important}
  .two-col{grid-template-columns:1fr!important;gap:16px!important}
  .stats-4{grid-template-columns:1fr 1fr!important}
  .arena-vs{display:none!important}
  .arena-cards{grid-template-columns:1fr 1fr!important;gap:10px!important}
  .arena-2col{grid-template-columns:1fr!important;gap:32px!important}
  .mp-4{grid-template-columns:1fr 1fr!important}
  .hide-mo{display:none!important}
}
</style>

const MOCK=[
  {id:'1',icon:'✦',title:'Claude Enterprise Engine',short:'기업용 자동화 프롬프트 시스템',cat:'PROMPT',price:100,donate:'₩100',dl:24200,forks:882,badge:'HOT',bc:'#EF4444',creator:'PromptLab',earned:2420000,tags:['자동화','법무']},

function Toast({t}){
  if(!t)return null;
  return React.createElement('div',{style:{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:9999,padding:'11px 20px',background:t.type==='error'?'rgba(239,68,68,.1)':'rgba(124,58,237,.1)',border:'1px solid '+(t.type==='error'?'rgba(239,68,68,.3)':'rgba(124,58,237,.3)'),borderRadius:8,color:t.type==='error'?'#FCA5A5':'#C4B5FD',fontSize:13,fontWeight:500,backdropFilter:'blur(12px)',whiteSpace:'nowrap'}},t.msg);
}

function App(){
  const [cat,setCat]=useState('ALL');
  const [q,setQ]=useState('');

  const [loading,setLoading]=useState(true);
  const [pay,setPay]=useState(null);

  const handleLike=async(e,c,type)=>{
    e.stopPropagation();
    const prev=likes[c.id];
    const next=prev===type?null:type;
    setLikes(p=>({...p,[c.id]:next}));
    // DB 업데이트
    try{
      const col=type==='up'?'like_count':'dislike_count';
      const delta=next===type?1:-1;
      await db.rpc('increment_'+col,{row_id:c.id,delta});
    }catch(e){/* 컬럼 없으면 무시 */}
  };
  const [arena,setArena]=useState(false);
  const [aIdx,setAIdx]=useState(0);
  const [voted,setVoted]=useState(null);
  const [res,setRes]=useState(false);
  const [mp,setMp]=useState(false);
  const [toast,setToast]=useState(null);
  const [log,setLog]=useState([
    {type:'DOWNLOAD',text:'Taxi Surge AI 다운로드',val:'+₩300'},
    {type:'DONATE',text:'Claude KR Pack 도네이션',val:'+₩1,000'},
    {type:'FORK',text:'PromptChain v4 포크',val:''},
    {type:'ARENA',text:'주간 배틀 투표 진행중',val:''},
    {type:'SETTLE',text:'주간 정산 완료',val:'+₩12,482,000'},
  ]);

  const showT=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),2500)};

  useEffect(()=>{
    db.from('assets').select('*').eq('status','ACTIVE').order('download_count',{ascending:false})
      .then(({data,error})=>{
        if(!error&&data&&data.length>0){
          setCards(data.map(a=>({id:a.id,icon:a.icon||'✦',title:a.title,short:a.description,cat:a.category,price:a.price,donate:'₩'+a.price,dl:a.download_count,forks:a.fork_count,badge:a.badge||'',bc:a.badge==='HOT'?'#EF4444':a.badge==='ARENA'?'#7C3AED':a.badge==='NEW'?'#22C55E':'',creator:'Creator',earned:a.donate_net,tags:a.tags||[]})));
        } else {
          setCards(MOCK);
        }
        setLoading(false);
      }).catch(()=>setLoading(false));
  },[]);

  useEffect(()=>{
    const L=[{type:'DOWNLOAD',text:'Claude Enterprise 다운로드',val:'+₩100'},{type:'DONATE',text:'MCP Suite 도네이션',val:'+₩1,000'},{type:'FORK',text:'AutoAgent 포크',val:''},{type:'UPLOAD',text:'새 에셋 업로드',val:''}];
    const t=setInterval(()=>setLog(p=>[L[Math.floor(Math.random()*L.length)],...p.slice(0,4)]),4000);
    return()=>clearInterval(t);
  },[]);

  const bt=BATTLES[aIdx];
  const tv=bt.lv+bt.rv+(voted?1:0);
  const lp=Math.round(((bt.lv+(voted==='left'?1:0))/tv)*100);
  const rp=100-lp;

  const ranked=[...cards].map(c=>({...c,ne:net(c.earned),score:net(c.earned)*.5+c.dl*.3+c.forks*.2})).sort((a,b)=>b.score-a.score);
  const filtered=cards.filter(c=>{
    if(cat!=='ALL'&&c.cat!==cat)return false;
    if(q){const ql=q.toLowerCase();if(!c.title.toLowerCase().includes(ql)&&!c.short.toLowerCase().includes(ql))return false}
    return true;
  });

  const lc=t=>({DOWNLOAD:'#8B5CF6',DONATE:'#22C55E',FORK:'#60A5FA',UPLOAD:'#F59E0B',ARENA:'#EC4899',SETTLE:'#22C55E'}[t]||'#555');

  const h=React.createElement;

  return h(React.Fragment,null,
    h(Toast,{t:toast}),

    // NAV
    h('header',{style:{position:'sticky',top:0,zIndex:100,borderBottom:'1px solid var(--b)',background:'rgba(0,0,0,.88)',backdropFilter:'blur(16px)'}},

    // HERO
    h('section',{style:{position:'relative',overflow:'hidden',padding:'80px 0 64px'}},

            h('div',{style:{display:'flex',gap:10,marginBottom:48,flexWrap:'wrap'}},
              h('button',{className:'bp',onClick:()=>document.getElementById('market').scrollIntoView({behavior:'smooth'}),style:{padding:'11px 22px',fontSize:14}},'마켓 입장 →'),
              h('button',{className:'bs',onClick:()=>setArena(true),style:{padding:'11px 22px',fontSize:14}},'⚔ Arena 배틀')
            ),
            h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',borderTop:'1px solid var(--b)'},className:'stats-4'},

                h('div',{key:l,style:{padding:'16px 0',paddingLeft:i>0?16:0,borderLeft:i>0?'1px solid var(--b)':'none'}},
                  h('div',{className:'lbl',style:{marginBottom:4}},l),
                  h('div',{style:{fontSize:18,fontWeight:700,color:'#fff'}},v)
                )
              )
            )
          ),
          // Live Feed
          h('div',{className:'card fi',style:{overflow:'hidden',animationDelay:'.12s'}},
            h('div',{style:{padding:'14px 18px',borderBottom:'1px solid var(--b)',display:'flex',alignItems:'center',justifyContent:'space-between'}},
              h('div',null,h('div',{className:'lbl',style:{marginBottom:3}},'Live Activity'),h('div',{style:{fontSize:14,fontWeight:600}},'실시간 기술 시장')),
              h('div',{style:{display:'flex',alignItems:'center',gap:6}},h('span',{style:{width:6,height:6,borderRadius:'50%',background:'#22C55E'},className:'dot'}),h('span',{style:{fontSize:11,color:'var(--t3)',fontWeight:500}},'LIVE'))

            h('div',{style:{padding:'6px 0'}},

          h('h2',{style:{fontSize:18,fontWeight:600,letterSpacing:'-.02em'}},'인기 기술'),

              h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:0,borderTop:'1px solid var(--b)',paddingTop:12}},

                    h('div',{style:{fontSize:12,fontWeight:600,color:col}},v)

              ),
              h('div',{style:{display:'flex',gap:8}},
                h('button',{className:'bp',onClick:e=>{
                  e.stopPropagation();
                  if(c.price===0||c.is_free){

                  } else {
                    setPay(c);setAmt(c.price);
                  }
                },style:{flex:1,justifyContent:'center',padding:'9px 0',fontSize:12}},c.price===0||c.is_free?'무료 다운로드':'다운로드'),
                h('button',{className:'bs',onClick:e=>{e.stopPropagation();setDon(c);setAmt(100);},style:{flex:1,justifyContent:'center',padding:'9px 0',fontSize:12}},'도네이션')
              ),

            h('div',{key:i,className:'card',onClick:()=>{if(!voted){setVoted(i===0?'left':'right');setTimeout(()=>setRes(true),300);}},style:{padding:20,cursor:voted?'default':'pointer',borderColor:voted===(i===0?'left':'right')?(i===0?'rgba(124,58,237,.5)':'rgba(96,165,250,.5)'):'var(--b)',background:voted===(i===0?'left':'right')?(i===0?'rgba(124,58,237,.06)':'rgba(96,165,250,.06)'):'var(--s)',opacity:voted&&voted!==(i===0?'left':'right')?.42:1,transition:'all .2s'}},
              h('div',{style:{fontSize:28,marginBottom:10}},s.icon),
              h('div',{className:'lbl',style:{marginBottom:3,color:i===0?'var(--pl)':'#60A5FA'}},s.cat),
              h('div',{style:{fontSize:14,fontWeight:600,letterSpacing:'-.02em',marginBottom:4,lineHeight:1.3}},s.title),
              h('p',{style:{fontSize:12,color:'var(--t2)',marginBottom:12}},s.desc),
              res
                ?h('div',null,
                    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},h('span',{style:{fontSize:16,fontWeight:700,color:i===0?'var(--pl)':'#60A5FA'}},(i===0?lp:rp)+'%'),h('span',{style:{fontSize:11,color:'var(--t3)',alignSelf:'flex-end'}},(i===0?bt.lv+(voted==='left'?1:0):bt.rv+(voted==='right'?1:0)).toLocaleString()+'표')),
                    h('div',{style:{height:3,background:'rgba(255,255,255,.06)',borderRadius:2,overflow:'hidden'}},h('div',{style:{height:'100%',borderRadius:2,width:(i===0?lp:rp)+'%',background:i===0?'var(--p)':'#3B82F6',transition:'width .65s cubic-bezier(.16,1,.3,1)'}}))
                  )
                :h('div',{style:{padding:'6px',textAlign:'center',border:'1px solid '+(i===0?'rgba(124,58,237,.3)':'rgba(96,165,250,.3)'),borderRadius:6,fontSize:12,fontWeight:500,color:i===0?'var(--pl)':'#60A5FA'}},voted===(i===0?'left':'right')?'✓ 투표 완료':'투표하기')
            )
          ].filter(Boolean))
        ),
        res&&h('div',{style:{padding:'10px 14px',textAlign:'center',marginBottom:10,border:'1px solid '+(lp>rp?'rgba(124,58,237,.3)':'rgba(96,165,250,.3)'),borderRadius:8,fontSize:13,fontWeight:500,color:lp>rp?'var(--pl)':'#60A5FA'}},'현재 우세 · ',(lp>rp?bt.left:bt.right).title,' 🏆 승리시 상대 도네 90% 획득'),
        h('div',{style:{display:'flex',gap:10}},
          h('button',{className:'bs',onClick:()=>{setArena(false);setVoted(null);setRes(false);},style:{flex:1,justifyContent:'center',padding:'11px 0'}},'닫기'),
          voted&&h('button',{className:'bp',onClick:()=>{setVoted(null);setRes(false);setAIdx((aIdx+1)%BATTLES.length);},style:{flex:1,justifyContent:'center',padding:'11px 0'}},'다음 배틀 →')
        ),
        h('div',{style:{display:'flex',justifyContent:'center',gap:5,marginTop:12}},
          ...BATTLES.map((_,i)=>h('div',{key:i,style:{width:i===aIdx?18:5,height:3,borderRadius:2,background:i===aIdx?'var(--p)':'rgba(255,255,255,.12)',transition:'width .2s'}}))
        )
      )
    ),

    // MYPAGE MODAL
    mp&&h('div',{onClick:()=>setMp(false),style:{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.85)',backdropFilter:'blur(8px)',overflowY:'auto',padding:20,display:'flex',justifyContent:'center',alignItems:'flex-start'}},
      h('div',{onClick:e=>e.stopPropagation(),className:'card',style:{width:'100%',maxWidth:600,background:'#0c0c0c',marginTop:28,marginBottom:28}},
        h('div',{style:{padding:'20px 24px',borderBottom:'1px solid var(--b)',display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',null,h('div',{className:'lbl',style:{marginBottom:4}},'Dashboard'),h('h3',{style:{fontSize:16,fontWeight:600}},'마이페이지')),
          h('button',{className:'bg',onClick:()=>setMp(false),style:{fontSize:20}},'×')
        ),
        h('div',{style:{padding:24}},
          h('div',{style:{padding:12,background:'rgba(255,255,255,.02)',border:'1px solid var(--b)',borderRadius:8,marginBottom:20,display:'flex',justifyContent:'space-between',fontSize:13,flexWrap:'wrap',gap:8}},
            h('span',{style:{color:'var(--t2)'}},h('strong',{style:{color:'var(--t1)'}},'₩31,800'),' 총 거래액'),
            h('span',{style:{color:'var(--r)'}},'수수료 −₩3,180'),
            h('span',{style:{color:'#22C55E',fontWeight:600}},'실수령 ₩28,620')
          ),
          h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:0,marginBottom:20,borderTop:'1px solid var(--b)',borderBottom:'1px solid var(--b)'},className:'mp-4'},
            ...[['실수령','₩28,620'],['이번주','₩164K'],['다운로드','12,842'],['랭킹','#14']].map(([l,v],i)=>
              h('div',{key:l,style:{padding:'14px 0',paddingLeft:i>0?12:0,borderLeft:i>0?'1px solid var(--b)':'none'}},
                h('div',{className:'lbl',style:{marginBottom:4}},l),
                h('div',{style:{fontSize:16,fontWeight:700,letterSpacing:'-.02em'}},v)
              )
            )
          ),
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
            h('div',{className:'lbl'},'Revenue History'),
            h('button',{className:'bg',onClick:()=>showT('✓ 정산 요청 완료'),style:{color:'var(--pl)',fontSize:12}},'정산 요청 →')
          ),
          ...[{n:'Taxi Surge AI',g:12300,t:'DOWNLOAD',d:'05.13'},{n:'PromptChain v4',g:8200,t:'DONATION',d:'05.12'},{n:'MCP Suite',g:5100,t:'DOWNLOAD',d:'05.11'},{n:'Claude KR Pack',g:3400,t:'FORK_ROYALTY',d:'05.10'}].map((r,i)=>
            h('div',{key:i,style:{display:'grid',gridTemplateColumns:'1fr auto auto auto',gap:'0 10px',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--b)'}},
              h('div',null,h('div',{style:{fontSize:12,fontWeight:500}},r.n),h('div',{className:'lbl',style:{marginTop:2}},h('span',{style:{color:'var(--pl)'}},r.t),' · ',r.d)),
              h('span',{style:{fontSize:11,color:'var(--t2)'}},'₩'+r.g.toLocaleString()),
              h('span',{style:{fontSize:11,color:'var(--r)'}},'−₩'+fee(r.g)),
              h('span',{style:{fontSize:11,fontWeight:600,color:'#22C55E'}},'₩'+net(r.g).toLocaleString())
            )
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
