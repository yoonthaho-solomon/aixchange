              <input type="email" placeholder="이메일" style={{padding:"12px 14px",borderRadius:14,background:"#000",border:"1px solid #27272a",color:"#fff",fontSize:14,outline:"none"}}/>
              <input type="password" placeholder="비밀번호" style={{padding:"12px 14px",borderRadius:14,background:"#000",border:"1px solid #27272a",color:"#fff",fontSize:14,outline:"none"}}/>
              <button onClick={()=>{setAuthOpen(false);showToast(authMode==="login"?"✓ 로그인 완료!":"✓ 회원가입 완료!");}}
                style={{padding:"13px",borderRadius:14,background:"#22d3ee",color:"#000",fontWeight:700,fontSize:14,cursor:"pointer",border:"none"}}>
                {authMode==="login"?"로그인":"회원가입"}
              </button>
              <div style={{textAlign:"center",fontSize:13,color:"#71717a"}}>
                {authMode==="login"
                  ? <span>계정이 없으신가요? <button onClick={()=>setAuthMode("signup")} style={{color:"#22d3ee",background:"none",border:"none",cursor:"pointer"}}>회원가입</button></span>
                  : <span>이미 계정이 있으신가요? <button onClick={()=>setAuthMode("login")} style={{color:"#22d3ee",background:"none",border:"none",cursor:"pointer"}}>로그인</button></span>
                }
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 업로드 모달 */}
      {uploadOpen && (
        <div style={{position:"fixed",inset:0,zIndex:50,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#09090b",border:"1px solid rgba(34,211,238,0.2)",borderRadius:28,padding:32,width:"100%",maxWidth:480}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
              <h3 style={{fontSize:20,fontWeight:700,color:"#22d3ee"}}>AI 기술 업로드</h3>
              <button onClick={()=>setUploadOpen(false)} style={{background:"none",border:"none",color:"#71717a",fontSize:20,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <input placeholder="제목" style={{padding:"12px 14px",borderRadius:14,background:"#000",border:"1px solid #27272a",color:"#fff",fontSize:14,outline:"none"}}/>
              <select style={{padding:"12px 14px",borderRadius:14,background:"#000",border:"1px solid #27272a",color:"#fff",fontSize:14,outline:"none"}}>
                {["PROMPT","AGENT","SKILL","MCP","HARNESS"].map(c=><option key={c}>{c}</option>)}
              </select>
              <div style={{display:"flex",gap:8}}>
                {[100,300,1000].map(p=>(
                  <button key={p} style={{flex:1,padding:"11px",borderRadius:12,border:"1px solid #27272a",color:"#a1a1aa",background:"transparent",cursor:"pointer"}}>₩{p}</button>
                ))}
              </div>
              <textarea placeholder="설명 (어떤 문제를 해결하나요?)" rows={4} style={{padding:"12px 14px",borderRadius:14,background:"#000",border:"1px solid #27272a",color:"#fff",fontSize:14,outline:"none",resize:"none"}}/>
              <button onClick={()=>{setUploadOpen(false);showToast("🎉 업로드 완료!");}}
                style={{padding:"13px",borderRadius:14,background:"#22d3ee",color:"#000",fontWeight:700,fontSize:14,cursor:"pointer",border:"none"}}>
                업로드 실행
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Arena 모달 */}
      {arenaOpen && (
        <div style={{position:"fixed",inset:0,zIndex:50,background:"rgba(0,0,0,0.95)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{width:"100%",maxWidth:700}}>
            <div style={{textAlign:"center",marginBottom:28}}>
              <div style={{display:"inline-flex",padding:"6px 16px",borderRadius:99,border:"1px solid rgba(168,85,247,0.3)",background:"rgba(168,85,247,0.1)",color:"#c084fc",fontSize:11,letterSpacing:"0.2em",marginBottom:12}}>⚔ WEEKLY ARENA</div>
              <h2 style={{fontSize:32,fontWeight:900}}>{ab.label}</h2>
              <p style={{color:"#71717a",marginTop:6,fontSize:14}}>{arenaVoted?"투표 완료! 결과를 확인하세요.":"더 뛰어난 AI 기술에 투표하세요."}</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:12,alignItems:"center",marginBottom:16}}>
              {[ab.left,ab.right].map((side,i)=>(
                <React.Fragment key={i}>
                  {i===1 && <div style={{textAlign:"center"}}>
                    <div style={{fontWeight:900,fontSize:24,color:"#3f3f46"}}>VS</div>
                    {arenaResult && <div style={{fontSize:11,color:"#52525b",marginTop:6}}>{totalV.toLocaleString()}명 참여</div>}
                  </div>}
                  <button onClick={()=>{if(!arenaVoted){setArenaVoted(i===0?"left":"right");setTimeout(()=>setArenaResult(true),400);}}}
                    disabled={!!arenaVoted}
                    style={{border:`2px solid ${arenaVoted===(i===0?"left":"right")?(i===0?"#22d3ee":"#a855f7"):"#27272a"}`,background:arenaVoted===(i===0?"left":"right")?(i===0?"rgba(34,211,238,0.1)":"rgba(168,85,247,0.1)"):"#09090b",borderRadius:24,padding:24,textAlign:"left",cursor:arenaVoted?"default":"pointer",opacity:arenaVoted&&arenaVoted!==(i===0?"left":"right")?0.5:1,transition:"all 0.2s"}}>
                    <div style={{fontSize:48,marginBottom:12}}>{side.icon}</div>
                    <div style={{fontSize:11,color:"#71717a",marginBottom:4}}>{side.category} · {side.creator}</div>
                    <div style={{fontWeight:900,fontSize:18,lineHeight:1.3,marginBottom:8,whiteSpace:"pre-line"}}>{side.title}</div>
                    <p style={{fontSize:13,color:"#71717a",marginBottom:12}}>{side.desc}</p>
                    {arenaResult?(
                      <div>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
                          <span style={{color:i===0?"#22d3ee":"#a855f7",fontWeight:700}}>{i===0?leftPct:rightPct}%</span>
                          <span style={{color:"#71717a"}}>{(i===0?ab.lv+(arenaVoted==="left"?1:0):ab.rv+(arenaVoted==="right"?1:0)).toLocaleString()}표</span>
                        </div>
                        <div style={{height:6,background:"#27272a",borderRadius:99,overflow:"hidden"}}>
                          <div style={{height:"100%",background:i===0?"#22d3ee":"#a855f7",borderRadius:99,width:`${i===0?leftPct:rightPct}%`,transition:"width 0.7s"}}/>
                        </div>
                      </div>
                    ):(
                      <div style={{textAlign:"center",padding:"8px",borderRadius:10,border:`1px solid ${i===0?"rgba(34,211,238,0.3)":"rgba(168,85,247,0.3)"}`,color:i===0?"#22d3ee":"#a855f7",fontSize:13,fontWeight:700}}>
                        {arenaVoted===(i===0?"left":"right")?"✓ 투표 완료":"투표하기"}
                      </div>
                    )}
                  </button>
                </React.Fragment>
              ))}
            </div>
            {arenaResult && (
              <div style={{border:`1px solid ${leftPct>rightPct?"rgba(34,211,238,0.3)":"rgba(168,85,247,0.3)"}`,background:leftPct>rightPct?"rgba(34,211,238,0.05)":"rgba(168,85,247,0.05)",borderRadius:16,padding:"14px 20px",textAlign:"center",marginBottom:12}}>
                <div style={{fontSize:11,color:"#71717a",letterSpacing:"0.1em"}}>현재 우세</div>
                <div style={{fontSize:18,fontWeight:900,marginTop:4,color:leftPct>rightPct?"#22d3ee":"#a855f7"}}>{(leftPct>rightPct?ab.left:ab.right).title.replace("\n"," ")}</div>
              </div>
            )}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setArenaOpen(false);setArenaVoted(null);setArenaResult(false);}} style={{flex:1,padding:"12px",borderRadius:16,border:"1px solid #27272a",color:"#fff",background:"transparent",cursor:"pointer",fontSize:14}}>닫기</button>
              {arenaVoted && <button onClick={()=>{setArenaVoted(null);setArenaResult(false);setArenaIdx((arenaIdx+1)%arenaBattles.length);}} style={{flex:1,padding:"12px",borderRadius:16,background:"#7c3aed",color:"#fff",fontWeight:700,cursor:"pointer",border:"none",fontSize:14}}>다음 배틀 →</button>}
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:12}}>
              {arenaBattles.map((_,i)=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:i===arenaIdx?"#a855f7":"#27272a"}}/>)}
            </div>
          </div>
        </div>
      )}

      {/* 마이페이지 모달 */}
      {myPageOpen && (
        <div style={{position:"fixed",inset:0,zIndex:50,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(8px)",overflow:"auto",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:16}}>
          <div style={{background:"#09090b",border:"1px solid rgba(168,85,247,0.2)",borderRadius:28,padding:32,width:"100%",maxWidth:640,marginTop:32,marginBottom:32}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
              <div>
                <h3 style={{fontSize:22,fontWeight:700,color:"#c084fc"}}>마이페이지</h3>
                <p style={{fontSize:13,color:"#71717a",marginTop:4}}>내 수익 · 다운로드 · 영향력</p>
              </div>
              <button onClick={()=>setMyPageOpen(false)} style={{background:"none",border:"none",color:"#71717a",fontSize:20,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{border:"1px solid rgba(250,204,21,0.2)",background:"rgba(250,204,21,0.05)",borderRadius:16,padding:"12px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",fontSize:13,fontFamily:"monospace",flexWrap:"wrap",gap:8}}>
              <span style={{color:"#a1a1aa"}}>총 거래액 <strong style={{color:"#fff"}}>₩31,800</strong></span>
              <span style={{color:"#f87171"}}>수수료 (10%) -₩3,180</span>
              <span style={{color:"#4ade80",fontWeight:700}}>실수령 ₩28,620</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
              {[["총 실수령","₩28,620"],["이번주","₩164,160"],["총 다운로드","12,842"],["내 랭킹","#14"]].map(([l,v])=>(
                <div key={l} style={{border:"1px solid #27272a",background:"#000",borderRadius:16,padding:"14px 10px",textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#71717a",marginBottom:6}}>{l}</div>
                  <div style={{fontSize:17,fontWeight:900,color:"#c084fc"}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{border:"1px solid #27272a",borderRadius:18,padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <h4 style={{fontSize:16,fontWeight:700}}>수익 내역</h4>
                <button onClick={()=>showToast("✓ 정산 요청이 접수되었습니다.")} style={{fontSize:13,color:"#22d3ee",background:"none",border:"none",cursor:"pointer"}}>정산 요청</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:6,fontSize:11,color:"#52525b",fontFamily:"monospace",marginBottom:8,padding:"0 4px"}}>
                <span>상품</span><span>총액</span><span style={{color:"#f87171"}}>수수료</span><span style={{color:"#4ade80"}}>실수령</span>
              </div>
              {[{name:"Taxi Surge AI",g:12300,t:"DOWNLOAD",d:"05.13"},{name:"PromptChain v4",g:8200,t:"DONATION",d:"05.12"},{name:"MCP Suite",g:5100,t:"DOWNLOAD",d:"05.11"},{name:"Claude KR Pack",g:3400,t:"FORK_ROYALTY",d:"05.10"}].map((r,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:6,alignItems:"center",border:"1px solid #27272a",borderRadius:12,padding:"12px 14px",marginBottom:6}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{r.name}</div>
                    <div style={{fontSize:11,color:"#52525b",marginTop:2}}><span style={{color:"#22d3ee"}}>{r.t}</span> · {r.d}</div>
                  </div>
                  <span style={{color:"#71717a",fontSize:12,fontFamily:"monospace"}}>₩{r.g.toLocaleString()}</span>
                  <span style={{color:"#f87171",fontSize:12,fontFamily:"monospace"}}>-₩{calcFee(r.g)}</span>
                  <span style={{color:"#4ade80",fontWeight:700,fontSize:12,fontFamily:"monospace"}}>₩{calcNet(r.g).toLocaleString()}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
